version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: myfinance
      POSTGRES_USER: myfinance_user
      POSTGRES_PASSWORD: myfinance_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myfinance_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://myfinance_user:myfinance_password@pg-234314f5-tesco66-1310.c.aivencloud.com:11342/myfinance?sslmode=require
      JWT_SECRET: your-secret-key-here
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
